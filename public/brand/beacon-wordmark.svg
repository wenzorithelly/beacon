<svg xmlns="http://www.w3.org/2000/svg" width="400" height="104" viewBox="0 0 400 104" fill="none" font-family="Geist, sans-serif">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;600&amp;family=Geist+Mono:wght@400&amp;display=swap');</style>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2e"/><stop offset="1" stop-color="#19191b"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ff7a45" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#ff7a45" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ff7a45" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffb27a" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ff7a45" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7a45" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tri" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#d8d8da"/>
    </linearGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(12,12) scale(0.8333)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#tile)" stroke="#ffffff" stroke-opacity="0.10"/>
    <rect x="0.5" y="0.5" width="95" height="48" rx="21.5" fill="#ffffff" fill-opacity="0.04"/>
    <circle cx="48" cy="40" r="40" fill="url(#warm)"/>
    <path d="M48 30 L40 4 L56 4 Z" fill="url(#beam)"/>
    <path d="M48 33 L72.5 73 L23.5 73 Z" fill="url(#tri)" stroke="#ffffff" stroke-width="2.4" stroke-linejoin="round"/>
    <circle cx="48" cy="31" r="5.2" fill="#ff7a45" filter="url(#glow)"/>
    <circle cx="48" cy="31" r="2" fill="#ffd9c2"/>
  </g>

  <text x="112" y="54" fill="#fafafa" font-size="38" font-weight="600" letter-spacing="-1">Beacon</text>
  <text x="114" y="76" fill="#9a9a9d" font-family="'Geist Mono', monospace" font-size="12.5" letter-spacing="0.3">the visual planning surface</text>
</svg>
