name: Bug report
description: Something in Beacon isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `beacon` in …
        2. …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Beacon version
      description: Output of `beacon --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: macOS 15 (arm64)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Console output, daemon logs, etc. Please redact anything sensitive.
      render: shell
