name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write # write the signatures file to the cla-signatures branch (same repo)
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Same-repo signature storage works with the built-in GITHUB_TOKEN (contents: write above).
          # A PERSONAL_ACCESS_TOKEN is only needed to store signatures in a REMOTE repo — not our case.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Where signatures are stored. Default: a JSON file on a separate branch of this repo.
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/wenzorithelly/beacon/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],github-actions[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"
