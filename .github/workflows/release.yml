name: Release

# Ship a new version end-to-end from CI: bump → test → publish to npm → tag + GitHub release.
# The in-app "new version available" banner (components/update-banner.tsx) only fires when a
# GitHub *release* exists whose tag is newer than the user's installed version, AND the matching
# version is live on npm (the install command runs `bun add -g trybeacon`). This workflow keeps
# those two in lockstep: it publishes to npm FIRST, then cuts a release at the SAME version, so a
# release tag never points at a version users can't actually install.
#
# We DELIBERATELY never push to `main`: it's guarded by a ruleset (PR-only + required checks) that
# the built-in GITHUB_TOKEN can't bypass, so a "push the bump commit to main" step fails every run.
# Instead the bump lives on a commit the TAG points at, and we push only the tag (tag refs aren't
# covered by a branch ruleset). The next release derives its version from npm — not the committed
# package.json — so main's package.json staying put never causes a version collision.
#
# Trigger from the Actions tab, or:  gh workflow run release.yml -f bump=patch
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

# Push the release tag and create the GitHub release with the built-in GITHUB_TOKEN (we never
# push to protected main — see the header note).
permissions:
  contents: write

# Never let two releases race (they'd fight over the version + tag).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned: `latest` once pulled a Bun whose bundler silently merged a cyclic
          # entrypoint pair and shipped a broken CLI (v0.1.18). Bump deliberately,
          # together with the local toolchain.
          bun-version: 1.3.14

      # Node provides `npm` for version/publish; registry-url wires NODE_AUTH_TOKEN into ~/.npmrc.
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the release on a green suite. `bun test` dirties the tracked test.db-* sidecars, but
      # we only ever stage package.json below, so that working-tree noise never reaches a commit.
      - name: Test
        run: bun test

      # Compute the next version from what's ACTUALLY on npm — not the committed package.json,
      # which we never bump on main (see "Tag the release" below). Basing the bump on the published
      # version keeps successive releases collision-free even though main's package.json never moves.
      # Bump WITHOUT touching git (no-git-tag-version) so the dirty test tree can't trip npm's
      # clean-tree check. The printed value (e.g. "v0.1.5") is the release tag.
      - name: Bump version
        id: version
        run: |
          cur=$(npm view trybeacon version)
          [ -n "$cur" ] || { echo "could not read the current npm version"; exit 1; }
          npm version --no-git-tag-version --allow-same-version "$cur" >/dev/null
          tag=$(npm version --no-git-tag-version "${{ inputs.bump }}")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (npm base v$cur)"

      # Publish FIRST. `prepublishOnly` (package.json) runs build:release (next build + CLI bundle).
      # If this fails, no tag/release is created — so the banner can never point at a missing version.
      # IDEMPOTENT: if a racing/duplicate run already published this version, skip instead of failing
      # with "cannot publish over …", so the bump/tag/release steps below still heal the repo state.
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          v=$(node -p "require('./package.json').version")
          if npm view "trybeacon@$v" version >/dev/null 2>&1; then
            echo "trybeacon@$v is already on npm — skipping publish (a racing run won it)."
          else
            npm publish --access public
          fi

      # Only after npm has the version: capture the bump in a commit, tag it, and push ONLY the tag.
      # We do NOT push to main — its ruleset (PR-only + required checks) rejects the GITHUB_TOKEN,
      # which is what made every release fail here. Tag refs aren't covered by a branch ruleset, so
      # this always succeeds. The tag points at the bump commit, so `git checkout <tag>` carries the
      # exact released package.json; main itself is intentionally left untouched.
      - name: Tag the release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # The release is what the in-app banner watches (releases/latest ignores drafts/prereleases,
      # so this must be a full published release).
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --title "${{ steps.version.outputs.tag }}"

      # The plugin ships INSIDE the npm package now (build:release generates .claude-plugin/plugin.json
      # + plugin/ into it), and the marketplace (.claude-plugin/marketplace.json) points at the npm
      # package — so `npm publish` above IS the plugin release. No separate marketplace repo to push.
